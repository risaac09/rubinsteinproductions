<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RP — Pitch Deck (Talk)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="deck.css" />
  <style>
    .slide-pad { padding: 80px 96px; box-sizing: border-box; }
    deck-stage > section { background: var(--rp-ink); color: var(--rp-fg); }
  </style>
</head>
<body style="background:#000;">
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0E0B08"/>
      <text x="50" y="50" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#E8DEC9">Say</text>
      <text x="50" y="78" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#C8922E">Why.</text>
    </svg>
  </template>
  <deck-stage id="deck" width="1920" height="1080">
    <section id="p1"></section><section id="p2"></section><section id="p3"></section>
    <section id="p4"></section><section id="p5"></section><section id="p6"></section>
    <section id="p7"></section><section id="p8"></section><section id="p9"></section>
    <section id="p10"></section>
  </deck-stage>

  <script src="deck-stage.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="arc-timeline.jsx"></script>
  <script type="text/babel" src="pitch-slides.jsx"></script>
  <script type="text/babel">
    const slides = window.PitchSlides;
    const labels = window.PitchLabels;
    slides.forEach((Comp, i) => {
      const el = document.getElementById(`p${i+1}`);
      el.setAttribute("data-screen-label", labels[i]);
      ReactDOM.createRoot(el).render(<Comp />);
    });
  </script>
</body>
</html>
